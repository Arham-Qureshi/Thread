<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>Thread</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div id="popup-root">

    <header id="popup-header">
      <div class="header-left">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
        </svg>
        <h1>Thread</h1>
      </div>
      <span id="model-status" class="caption">No context loaded</span>
    </header>

    <main id="canvas-area">
      <button id="btn-expand" aria-label="Expand graph">
        <svg id="icon-expand" viewBox="0 0 24 24">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
        </svg>
        <svg id="icon-collapse" viewBox="0 0 24 24" style="display: none;">
          <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"></path>
        </svg>
      </button>

      <div id="graph-legend">
        <div class="legend-item">
          <div class="legend-swatch swatch-user"></div>User
        </div>
        <div class="legend-item">
          <div class="legend-swatch swatch-assistant"></div>Assistant
        </div>
        <div class="legend-item">
          <div class="legend-swatch swatch-variable"></div>Variable
        </div>
        <div class="legend-item">
          <div class="legend-swatch swatch-link"></div>Link
        </div>
      </div>

      <div id="cy-container">
        <p id="canvas-placeholder" class="caption">Extract a conversation to see the context graph.</p>
      </div>
      <div id="state-info" class="hidden">
        <span id="node-count" class="badge">0 nodes</span>
        <span id="edge-count" class="badge">0 edges</span>
      </div>
    </main>

    <footer id="action-bar">
      <button id="btn-clear" class="btn btn-secondary" disabled>
        <span class="btn-icon">
          <svg viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </span>
        <span class="btn-text">Clear</span>
      </button>

      <button id="btn-extract" class="btn btn-primary">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 5v14M19 12l-7 7-7-7"></path>
          </svg>
        </span>
        <span class="btn-text">Extract</span>
      </button>

      <button id="btn-inject" class="btn btn-accent" disabled>
        <span class="btn-icon">
          <svg viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>
        </span>
        <span class="btn-text">Inject</span>
      </button>
    </footer>

    <div id="migration-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Migrate Thread</h2>
          <button id="modal-close" class="modal-close" aria-label="Close modal">
            <svg viewBox="0 0 24 24">
              <path d="M18 6L6 18M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <p class="modal-subtitle">Select your destination platform</p>
        <div class="platform-cards">
          <button class="platform-card" data-platform="chatgpt">
            <svg class="platform-logo" viewBox="0 0 24 24">
              <path d="M22.28 14.37a5.07 5.07 0 0 0-.44-4.16 5.12 5.12 0 0 0-5.52-2.49 5.07 5.07 0 0 0-3.82-1.7 5.12 5.12 0 0 0-4.88 3.54 5.07 5.07 0 0 0-3.39 2.46 5.12 5.12 0 0 0 .63 5.99 5.07 5.07 0 0 0 .44 4.16 5.12 5.12 0 0 0 5.52 2.49 5.07 5.07 0 0 0 3.82 1.7 5.12 5.12 0 0 0 4.88-3.54 5.07 5.07 0 0 0 3.39-2.46 5.12 5.12 0 0 0-.63-5.99z"></path>
              <path d="M9.81 19.07V13.6l4.65 2.73"></path>
              <path d="M14.46 4.93l-4.65 2.73V13.6"></path>
            </svg>
            <span class="platform-name">ChatGPT</span>
          </button>
          <button class="platform-card" data-platform="claude">
            <svg class="platform-logo" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke-width="1.5"></circle>
              <path d="M12 6v12M8.5 8l7 8M15.5 8l-7 8"></path>
            </svg>
            <span class="platform-name">Claude</span>
          </button>
          <button class="platform-card" data-platform="gemini">
            <svg class="platform-logo" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="none" stroke-width="1.5"></path>
              <path d="M12 2c3 3.6 3 14.4 0 20M12 2c-3 3.6-3 14.4 0 20M2 12h20"></path>
            </svg>
            <span class="platform-name">Gemini</span>
          </button>
        </div>
      </div>
    </div>

    <div id="status-toast" class="toast hidden"></div>
  </div>

  <script src="popup.bundle.js"></script>
</body>

</html>
